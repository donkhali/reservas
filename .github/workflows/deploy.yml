name: Desplegar RestoPub a GitHub Pages

on:
  push:
    branches: ["main"] # Cambia a "master" si tu rama principal se llama así

# AQUÍ ESTÁ EL TRUCO: Permisos obligatorios para que no falle el despliegue
permissions:
  contents: read
  pages: write
  id-token: write

# Evita colisiones si haces muchos pushes seguidos
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el archivo index.html
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Sube la raíz del proyecto donde está tu index.html

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
